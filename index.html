<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Prompt Builder</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Prompt <span>Builder</span></h1>
            <p>Craft the perfect prompt.</p>
        </header>

        <main>
            <div class="section">
                <h2>1. What text do you want to correct?</h2>
                <textarea id="topicInput" placeholder="Paste your text here..." style="width: 100%; height: 100px; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(15, 23, 42, 0.6); color: var(--text-color); font-size: 1rem; resize: vertical; outline: none;"></textarea>
            </div>

            <button id="generateBtn" class="generate-btn">Generate Perfect Prompt ✨</button>

            <div class="result-section hidden" id="resultSection">
                <div class="result-header">
                    <h2>Your Prompt</h2>
                    <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
                </div>
                <textarea id="promptOutput" readonly></textarea>
            </div>
        </main>
    </div>

    <script src="script.js?v=7"></script>
</body>
</html>
