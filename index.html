<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Prompt Builder</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">+ New Chat</button>
            <div class="history-list" id="historyList">
                <!-- History items will be populated here -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h2>AI Prompt Corrector</h2>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="message ai">
                    <div class="avatar">AI</div>
                    <div class="content">Hello! Type your Gujlish, Hindi, or broken English text below and I'll translate it perfectly into English.</div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <textarea id="topicInput" placeholder="Message AI Prompt Corrector..." rows="1"></textarea>
                    <button id="generateBtn" class="send-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <p class="disclaimer">AI can make mistakes. Verify important information.</p>
            </div>
        </main>
    </div>

    <script src="script.js?v=20"></script>
</body>
</html>
