<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Prompt Builder</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>AI Prompt <span>Builder</span></h1>
            <p>Craft the perfect prompt for ChatGPT, Midjourney, and more.</p>
        </header>

        <main>
            <div class="section">
                <h2>1. What's the topic?</h2>
                <input type="text" id="topicInput" placeholder="e.g., A futuristic city in cyberpunk style, or how to learn Python...">
            </div>

            <div class="section">
                <h2>2. Select a Role</h2>
                <div class="options-grid" id="roleOptions">
                    <button class="option-btn" data-value="Expert">Expert</button>
                    <button class="option-btn" data-value="Teacher">Teacher</button>
                    <button class="option-btn" data-value="Critic">Critic</button>
                    <button class="option-btn" data-value="Artist">Artist</button>
                    <button class="option-btn" data-value="Programmer">Programmer</button>
                    <button class="option-btn" data-value="Marketer">Marketer</button>
                </div>
            </div>

            <div class="section">
                <h2>3. Select a Tone</h2>
                <div class="options-grid" id="toneOptions">
                    <button class="option-btn" data-value="Professional">Professional</button>
                    <button class="option-btn" data-value="Humorous">Humorous</button>
                    <button class="option-btn" data-value="Academic">Academic</button>
                    <button class="option-btn" data-value="Creative">Creative</button>
                    <button class="option-btn" data-value="Direct">Direct</button>
                    <button class="option-btn" data-value="Empathetic">Empathetic</button>
                </div>
            </div>

            <div class="section">
                <h2>4. Select Length</h2>
                <div class="options-grid" id="lengthOptions">
                    <button class="option-btn" data-value="Short">Short & Concise</button>
                    <button class="option-btn" data-value="Medium">Medium</button>
                    <button class="option-btn" data-value="Long">Long & Detailed</button>
                </div>
            </div>

            <button id="generateBtn" class="generate-btn">Generate Perfect Prompt ✨</button>

            <div class="result-section hidden" id="resultSection">
                <div class="result-header">
                    <h2>Your Prompt</h2>
                    <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
                </div>
                <textarea id="promptOutput" readonly></textarea>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
