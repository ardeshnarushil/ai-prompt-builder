<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Prompt Builder</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Prompt
            </button>
            <div class="history-list" id="historyList">
                <!-- History items will be populated here -->
            </div>
            <button id="clearHistoryBtn" class="clear-history-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                Clear History
            </button>
        </aside>

        <!-- Main Workspace -->
        <main class="main-area">
            <div class="centered-container">
                <header>
                    <h1>AI Prompt <span>Builder</span></h1>
                    <p>Craft the perfect prompt.</p>
                </header>

                <div class="section">
                    <h2>1. What text do you want to correct?</h2>
                    <textarea id="topicInput" placeholder="Paste your text here..."></textarea>
                </div>

                <button id="generateBtn" class="generate-btn">
                    <span>Generate Perfect Prompt ✨</span>
                </button>

                <div class="result-section hidden" id="resultSection">
                    <div class="result-header">
                        <h2>Your Prompt</h2>
                        <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
                    </div>
                    <textarea id="promptOutput" readonly></textarea>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js?v=23"></script>
</body>
</html>
